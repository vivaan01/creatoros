openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CreatorOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: creator
    description: Creator profile and avatar
  - name: campaigns
    description: Brand deal campaigns
  - name: products
    description: Creator product catalog
  - name: links
    description: Linkrunner tracking links
  - name: conversations
    description: AI-driven DM conversations
  - name: dashboard
    description: Analytics and dashboard data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /creator/profile:
    get:
      operationId: getCreatorProfile
      tags: [creator]
      summary: Get creator profile and avatar config
      responses:
        "200":
          description: Creator profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorProfile"
    put:
      operationId: updateCreatorProfile
      tags: [creator]
      summary: Update creator profile and avatar vibe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreatorProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorProfile"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all brand deal campaigns
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products in catalog
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Add a product to catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /links:
    get:
      operationId: listLinks
      tags: [links]
      summary: List all tracking links
      responses:
        "200":
          description: List of tracking links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackingLink"
    post:
      operationId: createLink
      tags: [links]
      summary: Generate a new Linkrunner tracking link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkBody"
      responses:
        "201":
          description: Created tracking link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingLink"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List recent AI-driven DM conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall performance summary
      responses:
        "200":
          description: Dashboard summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/funnel:
    get:
      operationId: getFunnelStats
      tags: [dashboard]
      summary: Get funnel conversion stats per campaign
      responses:
        "200":
          description: Funnel stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FunnelStat"

  /dashboard/revenue-trend:
    get:
      operationId: getRevenueTrend
      tags: [dashboard]
      summary: Get daily revenue trend for the last 30 days
      responses:
        "200":
          description: Revenue trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueTrendPoint"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top converting products
      responses:
        "200":
          description: Top products by conversions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreatorProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        handle:
          type: string
        platform:
          type: string
          enum: [instagram, youtube, x]
        followerCount:
          type: integer
        avatarEnabled:
          type: boolean
        coreVibeConversational:
          type: string
          description: How the avatar greets and opens conversations
        coreVibeOperational:
          type: string
          description: The avatar's sales approach and product knowledge style
        coreVibeRelational:
          type: string
          description: How the avatar builds trust and handles objections
        coreVibeEthos:
          type: string
          description: Boundaries and values the avatar upholds
        signatureSlang:
          type: string
          description: Comma-separated Hinglish slang words the avatar uses
        profileImage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - handle
        - platform
        - followerCount
        - avatarEnabled
        - coreVibeConversational
        - coreVibeOperational
        - coreVibeRelational
        - coreVibeEthos
        - signatureSlang
        - createdAt

    UpdateCreatorProfileBody:
      type: object
      properties:
        name:
          type: string
        handle:
          type: string
        platform:
          type: string
          enum: [instagram, youtube, x]
        avatarEnabled:
          type: boolean
        coreVibeConversational:
          type: string
        coreVibeOperational:
          type: string
        coreVibeRelational:
          type: string
        coreVibeEthos:
          type: string
        signatureSlang:
          type: string
        profileImage:
          type: string
          nullable: true

    Campaign:
      type: object
      properties:
        id:
          type: integer
        brandName:
          type: string
        productName:
          type: string
        status:
          type: string
          enum: [active, paused, completed, draft]
        platform:
          type: string
          enum: [instagram, youtube, x]
        dealValue:
          type: number
          description: Total brand deal value in INR
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        totalClicks:
          type: integer
        totalConversions:
          type: integer
        totalRevenue:
          type: number
        conversionRate:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - brandName
        - productName
        - status
        - platform
        - dealValue
        - startDate
        - totalClicks
        - totalConversions
        - totalRevenue
        - conversionRate
        - createdAt

    CreateCampaignBody:
      type: object
      required:
        - brandName
        - productName
        - platform
        - dealValue
        - startDate
      properties:
        brandName:
          type: string
        productName:
          type: string
        platform:
          type: string
          enum: [instagram, youtube, x]
        dealValue:
          type: number
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true

    UpdateCampaignBody:
      type: object
      properties:
        brandName:
          type: string
        productName:
          type: string
        status:
          type: string
          enum: [active, paused, completed, draft]
        dealValue:
          type: number
        endDate:
          type: string
          format: date
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        inStock:
          type: boolean
        totalSales:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - category
        - inStock
        - totalSales
        - createdAt

    CreateProductBody:
      type: object
      required:
        - name
        - price
        - category
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        inStock:
          type: boolean

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        category:
          type: string
        inStock:
          type: boolean
        imageUrl:
          type: string
          nullable: true

    TrackingLink:
      type: object
      properties:
        id:
          type: integer
        shortCode:
          type: string
        destinationUrl:
          type: string
        campaignId:
          type: integer
          nullable: true
        productId:
          type: integer
          nullable: true
        label:
          type: string
          nullable: true
        totalClicks:
          type: integer
        uniqueClicks:
          type: integer
        conversions:
          type: integer
        revenue:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - shortCode
        - destinationUrl
        - totalClicks
        - uniqueClicks
        - conversions
        - revenue
        - createdAt

    CreateLinkBody:
      type: object
      required:
        - destinationUrl
      properties:
        destinationUrl:
          type: string
        campaignId:
          type: integer
          nullable: true
        productId:
          type: integer
          nullable: true
        label:
          type: string
          nullable: true

    Conversation:
      type: object
      properties:
        id:
          type: integer
        followerHandle:
          type: string
        platform:
          type: string
          enum: [instagram, youtube, x]
        status:
          type: string
          enum: [active, converted, dropped, pending]
        triggerComment:
          type: string
        messageCount:
          type: integer
        linkSent:
          type: boolean
        converted:
          type: boolean
        revenueGenerated:
          type: number
        startedAt:
          type: string
          format: date-time
        lastMessageAt:
          type: string
          format: date-time
      required:
        - id
        - followerHandle
        - platform
        - status
        - triggerComment
        - messageCount
        - linkSent
        - converted
        - revenueGenerated
        - startedAt
        - lastMessageAt

    ConversationDetail:
      type: object
      properties:
        conversation:
          $ref: "#/components/schemas/Conversation"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required:
        - conversation
        - messages

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [avatar, follower]
        content:
          type: string
        sentAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - sentAt

    DashboardSummary:
      type: object
      properties:
        totalRevenue:
          type: number
        totalConversions:
          type: integer
        totalDmsHandled:
          type: integer
        avgConversionRate:
          type: number
        activeCampaigns:
          type: integer
        totalBrands:
          type: integer
        revenueThisMonth:
          type: number
        conversionsThisMonth:
          type: integer
        revenueGrowthPct:
          type: number
          description: Month-over-month revenue growth percentage
      required:
        - totalRevenue
        - totalConversions
        - totalDmsHandled
        - avgConversionRate
        - activeCampaigns
        - totalBrands
        - revenueThisMonth
        - conversionsThisMonth
        - revenueGrowthPct

    FunnelStat:
      type: object
      properties:
        campaignId:
          type: integer
        brandName:
          type: string
        comments:
          type: integer
        dmsInitiated:
          type: integer
        linksClicked:
          type: integer
        purchases:
          type: integer
        conversionRate:
          type: number
      required:
        - campaignId
        - brandName
        - comments
        - dmsInitiated
        - linksClicked
        - purchases
        - conversionRate

    RevenueTrendPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        revenue:
          type: number
        conversions:
          type: integer
      required:
        - date
        - revenue
        - conversions

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        category:
          type: string
        totalSales:
          type: integer
        totalRevenue:
          type: number
        imageUrl:
          type: string
          nullable: true
      required:
        - productId
        - name
        - category
        - totalSales
        - totalRevenue
